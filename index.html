<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Swap</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body>
    <button id="theme-toggle">🌓</button>

    <header>
        <div class="header-content" data-aos="zoom-in">
            <span class="emoji-book">📘</span>
            <h1>Study Swap</h1>
        </div>
    </header>

    <main>
        <section class="upload-container" data-aos="fade-up">
            <input type="text" id="title" placeholder="Назва матеріалу">
            <input type="text" id="description" placeholder="Предмет (напр. Математика)">
            <div class="file-input-wrapper">
                <input type="file" id="image">
            </div>
            <button class="main-btn" onclick="uploadItem()">Завантажити</button>
        </section>

        <section class="search-container" data-aos="fade-up">
            <input type="text" id="search" placeholder="🔍 Пошук по предметах..." oninput="filterItems()">
        </section>

        <div id="items-container" class="cards-grid"></div>
    </main>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="app.js"></script>
</body>
</html>
