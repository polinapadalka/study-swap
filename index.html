<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Study Swap</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body>
    <button id="theme-toggle" class="theme-btn">
        <span class="sun">☀️</span>
        <span class="moon">🌙</span>
    </button>

    <header class="main-header">
        <div class="container" data-aos="fade-down">
            <div class="logo-area">
                <span class="emoji-book">📘</span>
                <h1>Study Swap</h1>
            </div>
            <p class="header-subtitle">Твій стильний простір для навчання</p>
        </div>
    </header>

    <main class="main-content container">
        <section class="upload-section card-box" data-aos="fade-up">
            <h2 class="section-title">Нове оголошення</h2>
            <div class="form-group">
                <input type="text" id="title" placeholder="Назва матеріалу">
                <input type="text" id="description" placeholder="Предмет (напр. Історія)">
                <label class="file-label">
                    <span>📁 Обрати файл</span>
                    <input type="file" id="image">
                </label>
            </div>
            <button class="primary-btn" onclick="uploadItem()">Опублікувати</button>
        </section>

        <section class="search-section" data-aos="fade-up">
            <div class="search-wrapper">
                <input type="text" id="search" placeholder="🔍 Пошук по предметах..." oninput="filterItems()">
            </div>
        </section>

        <div id="items-container" class="cards-grid"></div>
    </main>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="app.js"></script>
</body>
</html>
